<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hexanaut</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <div id="menu" class="screen">
      <h1>Hexanaut</h1>
      <p>Capture territory by looping back to your zone. Don't cross your own trail!</p>
      <div class="name-field">
        <label for="player-name">Your name</label>
        <input id="player-name" type="text" maxlength="20" placeholder="Enter your name" autocomplete="nickname">
      </div>
      <div class="controls-hint">
        <span><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> or <kbd>↑</kbd><kbd>←</kbd><kbd>↓</kbd><kbd>→</kbd> to move</span>
        <span>Mouse near edge to steer</span>
      </div>
      <button id="play-btn" class="btn-primary">Play</button>
    </div>

    <div id="game-screen" class="screen hidden">
      <canvas id="game-canvas"></canvas>
      <div id="hud">
        <div id="player-label">Player</div>
        <div id="score">Territory: 0%</div>
      </div>
    </div>

    <div id="game-over" class="screen hidden">
      <h2 id="game-over-title">Eliminated!</h2>
      <p id="game-over-stats"></p>
      <button id="restart-btn" class="btn-primary">Play Again</button>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
